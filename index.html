<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <title>더오름 출결 시스템</title>
</head>
<body>
    <div class="busy" id="busyBar"></div>
    <div id="offlineLock">
        <div style="font-size:100px; margin-bottom:24px;">📡</div>
        <div style="font-size:40px; font-weight:900;">학원 네트워크 점검 중</div>
    </div>
    <div id="screensaver">
        <div class="clock-time" id="ssTime">00:00</div>
        <div class="clock-date" id="ssDate">1월 1일 월요일</div>
        <div class="hint-pulse">📷 바코드를 스캐너에 대면 시작합니다</div>
    </div>
    <div id="fullModal">
        <div class="modal-icon" id="fmIcon"></div>
        <h1 class="modal-title" id="fmTitle"></h1>
        <p class="modal-desc" id="fmDesc"></p>
    </div>

    <header class="topbar">
        <div class="wrap row">
            <div class="brand" id="brandLogoContainer">더오름</div>
            <div class="navRow">
                <button class="tabBtn on" id="navKiosk">키오스크</button>
                <button class="tabBtn" id="navStaff">직원</button>
            </div>
            <div class="sp row">
                <div class="pill" id="safePill"><span class="dot" id="safeDot"></span><span id="safeText">Online</span></div>
                <div class="pill" id="whoPill">guest</div>
                <button class="btn btn-ghost hidden" id="btnLogout">로그아웃</button>
            </div>
        </div>
    </header>

    <main class="main">
        <div class="viewport" id="viewPort">
            </div>
    </main>

    <template id="tpl-kiosk">
        <div class="card heroCard">
            <div class="titleWrap"><span class="floor-badge" id="floorPill">5F</span><h2 class="cardTitle">출결 키오스크</h2></div>
            <div class="actGrid">
                <button class="actBtn on" id="btnCHECK_IN" data-mode="CHECK_IN"><span>등원</span></button>
                <button class="actBtn" id="btnCHECK_OUT" data-mode="CHECK_OUT"><span>하원</span></button>
                <button class="actBtn" id="btnMOVE" data-mode="MOVE"><span>이동</span></button>
                <button class="actBtn" id="btnOUTING" data-mode="OUTING"><span>외출</span></button>
            </div>
            <div class="input-wrapper"><input class="inp-big" id="kInput" placeholder="QR 스캔 / 학번 입력"></div>
            <div class="msg" id="kMsg"></div>
        </div>
    </template>
    
    <template id="tpl-login"> </template>
    <template id="tpl-staff"> </template>

    <script type="module" src="/src/main.js"></script>
</body>
</html>
